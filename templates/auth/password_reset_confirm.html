{% extends 'base.html' %}

{% block title %}Set New Password | Photo Buddy{% endblock %}

{% block extra_css %}
<style>
.auth-section{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:40px 20px;
}

.auth-wrapper{
    width:100%;
    max-width:420px;
}

.auth-card{
    padding:40px 35px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.card-header{
    font-size:28px;
    font-weight:700;
    color:white;
    text-align:center;
    margin-bottom:25px;
}

.auth-form p{
    margin-bottom:18px;
}

.auth-form label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    color:white;
    font-size:14px;
}

.auth-form input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
    transition:all .25s ease;
}

.auth-form input:focus{
    border-color:#6366f1;
    background:rgba(255,255,255,0.12);
    box-shadow:0 0 0 2px rgba(99,102,241,.25);
}

.auth-form ul{
    list-style:none;
    padding:0;
    margin-top:5px;
    font-size:12px;
    color:rgba(255,255,255,0.6);
}

.errorlist{
    list-style:none;
    padding:8px;
    border-radius:8px;
    margin-top:5px;
    background:rgba(239,68,68,0.2);
    color:#fecaca;
    font-size:13px;
}

.auth-submit-btn{
    width:100%;
    margin-top:10px;
    padding:13px;
    border:none;
    border-radius:12px;
    font-weight:600;
    font-size:15px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white;
    cursor:pointer;
    transition:all .25s ease;
}

.auth-submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(99,102,241,.35);
}
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-wrapper">
            <div class="auth-card glass-card fade-up">
                <h2 class="card-header">Set a new password</h2>

                <form method="post" class="auth-form">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary btn-lg auth-submit-btn">
                        Change Password
                    </button>
                </form>

            </div>
        </div>
    </div>
</section>
{% endblock %}
