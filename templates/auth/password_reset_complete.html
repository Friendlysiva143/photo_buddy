{% extends 'base.html' %}

{% block title %}Password Reset Complete | Photo Buddy{% endblock %}

{% block extra_css %}
<style>
.auth-section{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:40px 20px;
}

.auth-wrapper{
    width:100%;
    max-width:420px;
}

.auth-card{
    padding:45px 35px;
    border-radius:18px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.card-header{
    font-size:28px;
    font-weight:700;
    color:white;
    margin-bottom:15px;
}

.auth-subtitle{
    font-size:15px;
    color:rgba(255,255,255,0.75);
    margin-bottom:25px;
}

.success-icon{
    font-size:45px;
    margin-bottom:10px;
}

.auth-submit-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    font-weight:600;
    font-size:15px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white;
    text-decoration:none;
    display:inline-block;
    transition:all .25s ease;
}

.auth-submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(99,102,241,.35);
}
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-wrapper">
            <div class="auth-card glass-card fade-up">

                <div class="success-icon">✅</div>

                <h2 class="card-header">Password reset complete</h2>

                <p class="auth-subtitle">
                    Your password has been set successfully.
                </p>

                <a href="{% url 'login' %}" class="btn btn-primary btn-lg auth-submit-btn">
                    Login Now
                </a>

            </div>
        </div>
    </div>
</section>
{% endblock %}
