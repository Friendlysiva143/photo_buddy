{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block title %}Reset Password | Photo Buddy{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-wrapper">
            <div class="auth-card glass-card fade-up">
                <div class="auth-top">
                    <div class="auth-logo-circle">🔐</div>
                    <h2 class="card-header">Forgot your password?</h2>
                    <p class="auth-subtitle">Enter your email address and we’ll send you a reset link.</p>
                </div>

                <form method="post" class="auth-form">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary btn-lg auth-submit-btn">
                        Send Reset Link
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
