{% extends 'base.html' %}
{% block content %}

<head>
<title>Chat Room</title>

<style>

.chat-box{
    width:80%;
    height:400px;
    border:1px solid #ccc;
    overflow-y:scroll;
    padding:10px;
    margin-bottom:10px;
}

.msg{
    margin:8px 0;
}

.me{
    text-align:right;
    color:blue;
}

.other{
    text-align:left;
    color:green;
}

.msg img{
    max-width:200px;
    display:block;
    margin-top:5px;
    border-radius:6px;
}

</style>

<script>

function loadMessages(){

fetch("/chat/room/{{ room.id }}/messages/")
.then(response=>response.json())
.then(data=>{

let box=document.getElementById("chat-box");
box.innerHTML="";

data.forEach(m=>{

let div=document.createElement("div");
div.className="msg";

let isMe=m.sender==="{{ request.user.username }}";
div.classList.add(isMe?"me":"other");

let content="";

if(m.text){
content+="<b>"+m.sender+":</b> "+m.text;
}

if(m.image){

content+=`
<br>
<a href="${m.image}" download>
<img src="${m.image}" style="max-width:200px;border-radius:6px;margin-top:5px;cursor:pointer;">
</a>
`;

}

div.innerHTML=content;

box.appendChild(div);

});

box.scrollTop=box.scrollHeight;

});

}

function sendMessage(){

let text=document.getElementById("text").value;
let image=document.getElementById("image").files[0];

let formData=new FormData();

formData.append("text",text);

if(image){
formData.append("image",image);
}

fetch("/chat/room/{{ room.id }}/send/",{

method:"POST",

headers:{
"X-CSRFToken":"{{ csrf_token }}"
},

body:formData

})
.then(()=>{

document.getElementById("text").value="";
document.getElementById("image").value="";
document.getElementById("preview").innerHTML="";

loadMessages();

});

}


function previewImage(){

let file=document.getElementById("image").files[0];
let preview=document.getElementById("preview");

preview.innerHTML="";

if(file){

let img=document.createElement("img");

img.src=URL.createObjectURL(file);
img.style.maxWidth="120px";
img.style.marginTop="5px";
img.style.borderRadius="6px";

preview.appendChild(img);

}

}


setInterval(loadMessages,1000);
window.onload=loadMessages;

</script>

</head>


<body>

<h2>
Chat with
{% if request.user == room.user1 %}
{{ room.user2.username }}
{% else %}
{{ room.user1.username }}
{% endif %}
</h2>


<div id="chat-box" class="chat-box"></div>


<div style="display:flex;align-items:center;gap:8px">

<input type="file" id="image" style="display:none" onchange="previewImage()">

<button onclick="document.getElementById('image').click()" style="font-size:22px">
+
</button>

<input type="text" id="text" placeholder="Type message..." style="flex:1">

<button onclick="sendMessage()">Send</button>

</div>


<div id="preview"></div>


</body>

{% endblock %}
